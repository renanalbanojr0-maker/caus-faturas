<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAUS — Auditoria do Sistema</title>
<style>
/* ════════════════════════════════════════════════════════════════
   AUDITORIA — tema CLARO AZUL (Design System unificado)
   Mesma paleta do index.html e calculadora-nf.html
   ════════════════════════════════════════════════════════════════ */
:root {
  /* Paleta neutra */
  --c-bg:        #f5f6f8;
  --c-surface:   #ffffff;
  --c-surface-2: #fafbfc;
  --c-border:    #e1e4e8;
  --c-border-2:  #d4d8dd;
  --c-text:      #1f2328;
  --c-text-2:    #57606a;
  --c-text-3:    #8b949e;

  /* Cor primária (azul) */
  --c-primary:        #0969da;
  --c-primary-hover:  #0860c7;
  --c-primary-soft:   #ddf4ff;

  /* Acento secundário */
  --c-neutral:        #f6f8fa;
  --c-neutral-hover:  #eaeef2;
  --c-neutral-border: #d0d7de;

  /* Cores funcionais */
  --c-success:        #1a7f37;
  --c-success-soft:   #dafbe1;
  --c-warning:        #9a6700;
  --c-warning-soft:   #fff8c5;
  --c-danger:         #cf222e;
  --c-danger-soft:    #ffebe9;
  --c-info:           #0969da;
  --c-info-soft:      #ddf4ff;

  /* Aliases legados (compatibilidade) */
  --bg:        var(--c-bg);
  --bg-card:   var(--c-surface);
  --bg-hover:  var(--c-surface-2);
  --border:    var(--c-border);
  --text:      var(--c-text);
  --text-dim:  var(--c-text-2);
  --text-mute: var(--c-text-3);
  --accent:    var(--c-primary);
  --accent-2:  var(--c-primary);
  --ok:        var(--c-success);
  --warn:      var(--c-warning);
  --erro:      var(--c-danger);
  --info:      var(--c-info);

  /* Tipografia */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "Cascadia Mono", "Segoe UI Mono", Consolas, monospace;
  --sans:      var(--font-sans);
  --mono:      var(--font-mono);

  /* Sombras */
  --shadow-sm: 0 1px 2px rgba(31, 35, 40, 0.04);
  --shadow-md: 0 3px 6px rgba(31, 35, 40, 0.08), 0 1px 2px rgba(31, 35, 40, 0.04);
  --shadow-lg: 0 8px 24px rgba(31, 35, 40, 0.12);

  /* Bordas arredondadas */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 10px;
  --r-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  position: relative;
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 24px 56px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-logo {
  width: 38px; height: 38px;
  background: var(--c-primary);
  color: #fff;
  border-radius: var(--r-md);
  display: grid; place-items: center;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.5px;
}

.brand h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.brand-sub {
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
  font-weight: 500;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text-dim);
}
.user-info .user-name {
  color: var(--text);
  font-weight: 600;
}
.user-info button {
  background: var(--c-neutral);
  border: 1px solid var(--c-neutral-border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all .12s;
}
.user-info button:hover {
  background: var(--c-neutral-hover);
}

/* ── LOGIN BOX ── */
#tela-login {
  max-width: 380px;
  margin: 80px auto 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  box-shadow: var(--shadow-md);
}
#tela-login h2 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  text-align: center;
  letter-spacing: -0.01em;
}
#tela-login label {
  display: block;
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  margin-top: 14px;
  font-weight: 600;
}
#tela-login input {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg-card);
  border: 1px solid var(--c-neutral-border);
  border-radius: var(--r-md);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color .12s, box-shadow .12s;
}
#tela-login input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
#tela-login button {
  width: 100%;
  margin-top: 20px;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: 1px solid var(--accent);
  border-radius: var(--r-md);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .12s;
}
#tela-login button:hover {
  background: var(--c-primary-hover);
  border-color: var(--c-primary-hover);
}
#login-erro {
  display: none;
  margin-top: 12px;
  color: var(--erro);
  background: var(--c-danger-soft);
  border: 1px solid #ffcdd2;
  padding: 8px 12px;
  border-radius: var(--r-sm);
  font-size: 12px;
  text-align: center;
}

/* ── FILTROS ── */
.filtros-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 18px 22px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.filtros-titulo {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.filtros-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  align-items: end;
}
.filtros-grid label {
  display: block;
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 5px;
  font-weight: 600;
}
.filtros-grid input,
.filtros-grid select {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--c-neutral-border);
  border-radius: var(--r-md);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .12s, box-shadow .12s;
}
.filtros-grid input:focus,
.filtros-grid select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
.filtros-acoes {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.filtros-acoes button {
  background: var(--c-neutral);
  border: 1px solid var(--c-neutral-border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all .12s;
}
.filtros-acoes button:hover {
  background: var(--c-neutral-hover);
}
.filtros-acoes .btn-aplicar {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: 600;
}
.filtros-acoes .btn-aplicar:hover {
  background: var(--c-primary-hover);
  border-color: var(--c-primary-hover);
}

/* ── CARDS DE RESUMO ── */
.resumo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.resumo-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  border-left: 3px solid var(--c-text-3);
}
.resumo-num {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.resumo-lbl {
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 600;
}
.resumo-card.ok      { border-left-color: var(--ok); }
.resumo-card.ok .resumo-num    { color: var(--ok); }
.resumo-card.warn    { border-left-color: var(--warn); }
.resumo-card.warn .resumo-num  { color: var(--warn); }
.resumo-card.erro    { border-left-color: var(--erro); }
.resumo-card.erro .resumo-num  { color: var(--erro); }
.resumo-card.info    { border-left-color: var(--info); }
.resumo-card.info .resumo-num  { color: var(--info); }
.resumo-card.accent  { border-left-color: var(--accent); }
.resumo-card.accent .resumo-num{ color: var(--accent); }

/* ── TABELA DE EVENTOS ── */
.tabela-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.tabela-eventos {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tabela-eventos thead {
  background: var(--bg-hover);
}
.tabela-eventos th {
  text-align: left;
  padding: 11px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  font-family: var(--sans);
}
.tabela-eventos td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
.tabela-eventos tbody tr:last-child td { border-bottom: none; }
.tabela-eventos tbody tr:hover td { background: var(--bg-hover); }

.col-ts {
  white-space: nowrap;
  color: var(--text-dim);
  width: 165px;
  font-family: var(--mono);
  font-size: 12px;
}
.col-user {
  font-weight: 600;
  width: 130px;
  text-transform: capitalize;
}
.col-acao { width: 180px; }
.col-detalhes {
  color: var(--text-dim);
  font-size: 12px;
  font-family: var(--mono);
}

/* Badges de ação */
.acao-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.acao-badge.login   { background: var(--c-info-soft);    color: var(--info); border-color: #a8d4f5; }
.acao-badge.logout  { background: var(--c-neutral);      color: var(--text-dim); border-color: var(--c-neutral-border); }
.acao-badge.criar   { background: var(--c-success-soft); color: var(--ok); border-color: #a3d9b1; }
.acao-badge.editar  { background: var(--c-warning-soft); color: var(--warn); border-color: #fde68a; }
.acao-badge.confer  { background: var(--c-success-soft); color: var(--ok); border-color: #a3d9b1; }
.acao-badge.descon  { background: var(--c-warning-soft); color: var(--warn); border-color: #fde68a; }
.acao-badge.zerar   { background: var(--c-danger-soft);  color: var(--erro); border-color: #ffcdd2; }
.acao-badge.user    { background: var(--c-primary-soft); color: var(--accent); border-color: #a8d4f5; }
.acao-badge.outro   { background: var(--c-neutral);      color: var(--text-dim); border-color: var(--c-neutral-border); }

.lista-vazia {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-mute);
  font-size: 13px;
}

.paginacao {
  margin-top: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-dim);
}
.paginacao button {
  background: var(--c-neutral);
  border: 1px solid var(--c-neutral-border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background .12s;
}
.paginacao button:hover:not(:disabled) {
  background: var(--c-neutral-hover);
}
.paginacao button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

footer {
  margin-top: 28px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 12px;
  color: var(--text-mute);
}
.footer-actions {
  display: flex;
  gap: 8px;
}
.footer-actions button,
.footer-actions a {
  background: var(--c-neutral);
  border: 1px solid var(--c-neutral-border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: var(--r-md);
  cursor: pointer;
  text-decoration: none;
  transition: background .12s;
}
.footer-actions button:hover,
.footer-actions a:hover {
  background: var(--c-neutral-hover);
}

@media (max-width: 700px) {
  .container { padding: 20px 14px 40px; }
  .col-ts { width: auto; }
  .tabela-eventos { font-size: 12px; }
  .tabela-eventos th, .tabela-eventos td { padding: 9px 12px; }
}
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <div class="brand-logo">CF</div>
      <div>
        <h1>CAUS Faturas</h1>
        <div class="brand-sub">Log de auditoria</div>
      </div>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <span>Logado: <span class="user-name" id="user-name"></span></span>
      <button onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <!-- TELA DE LOGIN -->
  <div id="tela-login">
    <h2>Auditoria do Sistema</h2>
    <p style="text-align:center;color:var(--text-mute);font-size:12px;margin-top:4px;margin-bottom:8px;">Acesso restrito a administradores</p>
    <label>Usuário</label>
    <input type="text" id="loginUser" autocomplete="off" placeholder="seu usuário">
    <label>Senha</label>
    <input type="password" id="loginPass" autocomplete="current-password" placeholder="senha">
    <button onclick="fazerLogin()">Entrar</button>
    <div id="login-erro"></div>
  </div>

  <!-- TELA PRINCIPAL -->
  <div id="tela-principal" style="display:none;">

    <!-- Cards de resumo -->
    <div class="resumo-grid" id="resumo-grid"></div>

    <!-- Filtros -->
    <div class="filtros-card">
      <div class="filtros-titulo">Filtros</div>
      <div class="filtros-grid">
        <div>
          <label>Usuário</label>
          <input type="text" id="f-usuario" placeholder="Todos">
        </div>
        <div>
          <label>Ação</label>
          <select id="f-acao">
            <option value="">Todas</option>
            <option value="login">login</option>
            <option value="logout">logout</option>
            <option value="finalizar-fatura">finalizar-fatura</option>
            <option value="conferir-fatura">conferir-fatura</option>
            <option value="desconferir-fatura">desconferir-fatura</option>
            <option value="editar-fatura">editar-fatura</option>
            <option value="zerar-tudo">zerar-tudo</option>
            <option value="criar-usuario">criar-usuario</option>
            <option value="excluir-usuario">excluir-usuario</option>
            <option value="trocar-senha">trocar-senha</option>
          </select>
        </div>
        <div>
          <label>Data início</label>
          <input type="date" id="f-data-inicio">
        </div>
        <div>
          <label>Data fim</label>
          <input type="date" id="f-data-fim">
        </div>
      </div>
      <div class="filtros-acoes">
        <button class="btn-aplicar" onclick="aplicarFiltros()">Aplicar</button>
        <button onclick="limparFiltros()">Limpar</button>
        <button onclick="atualizar()">Atualizar</button>
      </div>
    </div>

    <!-- Tabela de eventos -->
    <div class="tabela-wrap">
      <table class="tabela-eventos">
        <thead>
          <tr>
            <th>Quando</th>
            <th>Usuário</th>
            <th>Ação</th>
            <th>Detalhes</th>
          </tr>
        </thead>
        <tbody id="tabela-eventos-body">
          <tr><td colspan="4" class="lista-vazia">Carregando…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Paginação -->
    <div class="paginacao">
      <span id="info-paginacao">—</span>
      <div>
        <button id="btn-anterior" onclick="paginaAnterior()" disabled>Anterior</button>
        <button id="btn-proximo" onclick="paginaProxima()" disabled>Próximo</button>
      </div>
    </div>

    <footer>
      <div>CAUS Faturas · Auditoria v1.0</div>
      <div class="footer-actions">
        <button onclick="exportarCSV()">Exportar CSV</button>
        <a href="/admin/saude" target="_blank">Saúde do sistema</a>
      </div>
    </footer>

  </div>
</div>

<script>
/* ── ESTADO ── */
const SESSAO_KEY = "caus_sessao_audit";
let sessao = null;
let paginaAtual = 0;
const TAMANHO_PAGINA = 50;
let totalEventos = 0;
let eventosCarregados = []; // pra exportar CSV

/* ── SESSÃO ── */
function carregarSessao() {
  try {
    const raw = localStorage.getItem(SESSAO_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function salvarSessao(s) {
  localStorage.setItem(SESSAO_KEY, JSON.stringify(s));
  sessao = s;
}
function limparSessao() {
  localStorage.removeItem(SESSAO_KEY);
  sessao = null;
}

/* ── LOGIN ── */
async function fazerLogin() {
  const u = document.getElementById("loginUser").value.trim();
  const s = document.getElementById("loginPass").value.trim();
  const erro = document.getElementById("login-erro");
  if(!u || !s) {
    erro.textContent = "Preencha usuário e senha";
    erro.style.display = "block";
    return;
  }
  try {
    const r = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: u, senha: s })
    });
    const j = await r.json();
    if(!j.ok) {
      erro.textContent = j.erro || "Não consegui fazer login";
      erro.style.display = "block";
      return;
    }
    if(j.role !== "admin") {
      erro.textContent = "Esta tela é só pra administradores";
      erro.style.display = "block";
      return;
    }
    salvarSessao({ token: j.token, usuario: j.usuario, role: j.role });
    mostrarTelaPrincipal();
  } catch(e) {
    erro.textContent = "Falha na conexão: " + e.message;
    erro.style.display = "block";
  }
}

async function fazerLogout() {
  if(!confirm("Deseja sair?")) return;
  if(sessao?.token) {
    try {
      await fetch("/auth/logout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: sessao.token })
      });
    } catch(e) {}
  }
  limparSessao();
  location.reload();
}

function mostrarTelaPrincipal() {
  document.getElementById("tela-login").style.display = "none";
  document.getElementById("tela-principal").style.display = "block";
  document.getElementById("user-info").style.display = "flex";
  document.getElementById("user-name").textContent = sessao.usuario;
  atualizar();
}

/* ── ATUALIZAR ── */
async function atualizar() {
  await Promise.all([carregarResumo(), carregarEventos()]);
}

async function carregarResumo() {
  try {
    const r = await fetch("/auditoria/contagem-acoes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: sessao.token, dias: 30 })
    });
    const j = await r.json();
    if(!j.ok) throw new Error(j.erro);
    renderResumo(j.contagem, j.total, j.dias);
  } catch(e) {
    document.getElementById("resumo-grid").innerHTML =
      `<div class="resumo-card erro"><div class="resumo-num">!</div><div class="resumo-lbl">${escapeHtml(e.message)}</div></div>`;
  }
}

function renderResumo(contagem, total, dias) {
  // Pega top 5 ações + total
  const top = contagem.slice(0, 5);
  let html = `<div class="resumo-card accent">
    <div class="resumo-num">${total}</div>
    <div class="resumo-lbl">Total (${dias}d)</div>
  </div>`;
  for(const c of top) {
    const cls = classeAcao(c._id);
    html += `<div class="resumo-card ${cls}">
      <div class="resumo-num">${c.count}</div>
      <div class="resumo-lbl">${escapeHtml(c._id)}</div>
    </div>`;
  }
  document.getElementById("resumo-grid").innerHTML = html;
}

function classeAcao(acao) {
  if(acao === "login" || acao === "logout") return "info";
  if(acao === "zerar-tudo") return "erro";
  if(acao.includes("editar") || acao.includes("desconferir")) return "warn";
  if(acao.includes("conferir") || acao.includes("finalizar") || acao.includes("criar")) return "ok";
  return "";
}

async function carregarEventos() {
  const tbody = document.getElementById("tabela-eventos-body");
  tbody.innerHTML = `<tr><td colspan="4" class="lista-vazia">Carregando…</td></tr>`;
  try {
    const filtros = {};
    const fu = document.getElementById("f-usuario").value.trim();
    const fa = document.getElementById("f-acao").value;
    const fdi = document.getElementById("f-data-inicio").value;
    const fdf = document.getElementById("f-data-fim").value;
    if(fu) filtros.usuario = fu;
    if(fa) filtros.acao = fa;
    if(fdi) filtros.dataInicio = fdi + "T00:00:00";
    if(fdf) filtros.dataFim = fdf + "T23:59:59";

    const r = await fetch("/auditoria/listar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token: sessao.token,
        filtros,
        limite: TAMANHO_PAGINA,
        skip: paginaAtual * TAMANHO_PAGINA,
      })
    });
    const j = await r.json();
    if(!j.ok) throw new Error(j.erro);
    totalEventos = j.total;
    eventosCarregados = j.eventos;
    renderEventos(j.eventos);
    atualizarPaginacao();
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="4" class="lista-vazia" style="color:var(--erro);">${escapeHtml(e.message)}</td></tr>`;
  }
}

function renderEventos(eventos) {
  const tbody = document.getElementById("tabela-eventos-body");
  if(!eventos || eventos.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="lista-vazia">Nenhum evento encontrado com esses filtros.</td></tr>`;
    return;
  }
  let html = "";
  for(const ev of eventos) {
    const ts = new Date(ev.timestamp);
    const tsStr = ts.toLocaleString("pt-BR", { dateStyle: "short", timeStyle: "medium" });
    const cls = badgeClasse(ev.acao);
    const detalhes = formatDetalhes(ev.detalhes);
    html += `<tr>
      <td class="col-ts">${tsStr}</td>
      <td class="col-user">${escapeHtml(ev.usuario || "—")}</td>
      <td class="col-acao"><span class="acao-badge ${cls}">${escapeHtml(ev.acao)}</span></td>
      <td class="col-detalhes">${detalhes}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

function badgeClasse(acao) {
  if(acao === "login") return "login";
  if(acao === "logout") return "logout";
  if(acao === "finalizar-fatura") return "criar";
  if(acao === "conferir-fatura") return "confer";
  if(acao === "desconferir-fatura") return "descon";
  if(acao === "editar-fatura") return "editar";
  if(acao === "zerar-tudo") return "zerar";
  if(acao.includes("usuario") || acao === "trocar-senha") return "user";
  return "outro";
}

function formatDetalhes(d) {
  if(!d || Object.keys(d).length === 0) return "—";
  const partes = [];
  for(const k in d) {
    partes.push(`<span style="color:var(--text-mute);">${escapeHtml(k)}:</span> ${escapeHtml(JSON.stringify(d[k]))}`);
  }
  return partes.join("&nbsp;&nbsp;");
}

/* ── FILTROS ── */
function aplicarFiltros() {
  paginaAtual = 0;
  carregarEventos();
}

function limparFiltros() {
  document.getElementById("f-usuario").value = "";
  document.getElementById("f-acao").value = "";
  document.getElementById("f-data-inicio").value = "";
  document.getElementById("f-data-fim").value = "";
  paginaAtual = 0;
  carregarEventos();
}

/* ── PAGINAÇÃO ── */
function atualizarPaginacao() {
  const inicio = paginaAtual * TAMANHO_PAGINA + 1;
  const fim = Math.min(inicio + TAMANHO_PAGINA - 1, totalEventos);
  document.getElementById("info-paginacao").textContent =
    totalEventos === 0 ? "0 resultados" : `${inicio}–${fim} de ${totalEventos}`;
  document.getElementById("btn-anterior").disabled = paginaAtual === 0;
  document.getElementById("btn-proximo").disabled = (fim >= totalEventos);
}
function paginaAnterior() {
  if(paginaAtual > 0) { paginaAtual--; carregarEventos(); }
}
function paginaProxima() {
  paginaAtual++;
  carregarEventos();
}

/* ── EXPORTAR CSV ── */
function exportarCSV() {
  if(!eventosCarregados || eventosCarregados.length === 0) {
    alert("Nada pra exportar nesta página.");
    return;
  }
  const linhas = [["timestamp", "usuario", "acao", "detalhes"]];
  for(const ev of eventosCarregados) {
    linhas.push([
      new Date(ev.timestamp).toISOString(),
      ev.usuario || "",
      ev.acao || "",
      JSON.stringify(ev.detalhes || {}),
    ]);
  }
  const csv = "\uFEFF" + linhas.map(l => l.map(c => `"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `auditoria-pagina-${paginaAtual+1}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ── HELPERS ── */
function escapeHtml(s) {
  if(s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

/* ── ENTER NO LOGIN ── */
document.addEventListener("keydown", (e) => {
  if(e.key === "Enter" && document.getElementById("tela-login").style.display !== "none") {
    fazerLogin();
  }
});

/* ── START ── */
sessao = carregarSessao();
if(sessao && sessao.role === "admin") {
  mostrarTelaPrincipal();
} else {
  document.getElementById("loginUser").focus();
}
</script>
