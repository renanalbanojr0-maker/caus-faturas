<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAUS — Saúde do Sistema</title>
<!-- Favicon e ícones (aba do navegador, atalhos, mobile) -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
<meta name="theme-color" content="#0969da">
<meta name="apple-mobile-web-app-title" content="CAUS Faturas">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
/* ════════════════════════════════════════════════════════════════
   SAÚDE DO SISTEMA — tema CLARO AZUL (Design System unificado)
   Mesma paleta do index.html, calculadora-nf.html e admin-auditoria.html
   ════════════════════════════════════════════════════════════════ */
:root {
  /* Paleta neutra */
  --c-bg:        #f5f6f8;
  --c-surface:   #ffffff;
  --c-surface-2: #fafbfc;
  --c-border:    #e1e4e8;
  --c-border-2:  #d4d8dd;
  --c-text:      #1f2328;
  --c-text-2:    #57606a;
  --c-text-3:    #8b949e;

  /* Cor primária (azul) */
  --c-primary:        #0969da;
  --c-primary-hover:  #0860c7;
  --c-primary-soft:   #ddf4ff;

  /* Acento secundário */
  --c-neutral:        #f6f8fa;
  --c-neutral-hover:  #eaeef2;
  --c-neutral-border: #d0d7de;

  /* Cores funcionais */
  --c-success:        #1a7f37;
  --c-success-soft:   #dafbe1;
  --c-warning:        #9a6700;
  --c-warning-soft:   #fff8c5;
  --c-danger:         #cf222e;
  --c-danger-soft:    #ffebe9;

  /* Aliases legados */
  --bg:        var(--c-bg);
  --bg-card:   var(--c-surface);
  --bg-hover:  var(--c-surface-2);
  --border:    var(--c-border);
  --text:      var(--c-text);
  --text-dim:  var(--c-text-2);
  --text-mute: var(--c-text-3);
  --accent:    var(--c-primary);
  --ok:        var(--c-success);
  --warn:      var(--c-warning);
  --erro:      var(--c-danger);

  /* Tipografia */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "Cascadia Mono", "Segoe UI Mono", Consolas, monospace;
  --sans:      var(--font-sans);
  --mono:      var(--font-mono);

  /* Sombras */
  --shadow-sm: 0 1px 2px rgba(31, 35, 40, 0.04);
  --shadow-md: 0 3px 6px rgba(31, 35, 40, 0.08), 0 1px 2px rgba(31, 35, 40, 0.04);
  --shadow-lg: 0 8px 24px rgba(31, 35, 40, 0.12);

  /* Bordas arredondadas */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 10px;
  --r-pill: 999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  position: relative;
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 24px 56px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 20px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-logo {
  width: 38px; height: 38px;
  background: var(--c-primary);
  color: #fff;
  border-radius: var(--r-md);
  display: grid; place-items: center;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.5px;
}

.brand h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.brand-sub {
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
  font-weight: 500;
}

.refresh-info {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--c-surface);
  border: 1px solid var(--border);
  padding: 6px 12px 6px 10px;
  border-radius: var(--r-pill);
}

.refresh-info .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--c-success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

/* ── STATUS GERAL (banner grande) ── */
.status-banner {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 24px 28px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--text-mute);
  transition: border-left-color 0.3s;
}

.status-banner[data-status="ok"]   { border-left-color: var(--ok); }
.status-banner[data-status="warn"] { border-left-color: var(--warn); }
.status-banner[data-status="erro"] { border-left-color: var(--erro); }

.status-label {
  font-size: 11px;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  font-weight: 600;
}

.status-valor {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
}

.status-banner[data-status="ok"]   .status-valor { color: var(--ok); }
.status-banner[data-status="warn"] .status-valor { color: var(--warn); }
.status-banner[data-status="erro"] .status-valor { color: var(--erro); }

.status-timestamp {
  font-size: 12px;
  color: var(--text-dim);
  text-align: right;
}

.status-timestamp strong {
  color: var(--text);
  font-weight: 600;
  font-size: 14px;
  display: block;
  margin-bottom: 2px;
  font-family: var(--mono);
}

/* ── GRID DOS CHECKS ── */
.checks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}

.check-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 18px 20px;
  transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow-sm);
}

.check-card:hover {
  border-color: var(--c-text-3);
  box-shadow: var(--shadow-md);
}

.check-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.check-nome {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.01em;
}

.check-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid transparent;
}

.check-badge[data-status="ok"] {
  background: var(--c-success-soft);
  color: var(--ok);
  border-color: #a3d9b1;
}
.check-badge[data-status="warn"] {
  background: var(--c-warning-soft);
  color: var(--warn);
  border-color: #fde68a;
}
.check-badge[data-status="erro"] {
  background: var(--c-danger-soft);
  color: var(--erro);
  border-color: #ffcdd2;
}

.check-detalhes {
  font-size: 12px;
  line-height: 1.85;
}

.check-detalhes .linha {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.check-detalhes .chave {
  color: var(--text-mute);
  font-weight: 500;
}

.check-detalhes .valor {
  color: var(--text);
  text-align: right;
  word-break: break-all;
  font-family: var(--mono);
  font-size: 12px;
}

.check-detalhes .valor.alerta { color: var(--warn); font-weight: 600; }
.check-detalhes .valor.erro   { color: var(--erro); font-weight: 600; }

/* ── FOOTER ── */
footer {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 12px;
  color: var(--text-mute);
}

.footer-actions {
  display: flex;
  gap: 8px;
}

.footer-actions button,
.footer-actions a {
  background: var(--c-neutral);
  border: 1px solid var(--c-neutral-border);
  color: var(--text);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: var(--r-md);
  cursor: pointer;
  text-decoration: none;
  transition: background 0.12s;
}

.footer-actions button:hover,
.footer-actions a:hover {
  background: var(--c-neutral-hover);
}
.footer-actions .btn-primary {
  background: var(--c-primary);
  color: #fff;
  border-color: var(--c-primary);
}
.footer-actions .btn-primary:hover {
  background: var(--c-primary-hover);
  border-color: var(--c-primary-hover);
}

/* ── LOADING / ERRO ── */
.msg-loading, .msg-erro {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
  font-size: 14px;
}

.msg-loading::before {
  content: "";
  display: inline-block;
  width: 8px; height: 8px;
  background: var(--c-success);
  border-radius: 50%;
  margin-right: 10px;
  animation: pulse 1s infinite;
}

/* Mobile */
@media (max-width: 600px) {
  .container { padding: 20px 14px 40px; }
  .status-banner { padding: 20px; flex-direction: column; align-items: flex-start; }
  .status-timestamp { text-align: left; }
  .status-valor { font-size: 18px; }
  .checks-grid { grid-template-columns: 1fr; }
  .brand h1 { font-size: 14px; }
}
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <div class="brand-logo">CF</div>
      <div>
        <h1>CAUS Faturas</h1>
        <div class="brand-sub">Saúde do sistema</div>
      </div>
    </div>
    <div class="refresh-info">
      <span class="dot"></span>
      <span>Atualiza a cada <strong id="refresh-seconds">30</strong>s</span>
    </div>
  </header>

  <div id="conteudo">
    <div class="msg-loading">Conferindo o sistema…</div>
  </div>
</div>

<script>
// ── Nomes amigáveis dos checks ──
const LABELS = {
  servidor:        'Servidor Node',
  mongodb:         'MongoDB Atlas',
  disco:           'Disco do VPS',
  dadosArquivo:    'Arquivo de Dados',
  backupsLocais:   'Backups Locais (VPS)',
  backupGoogle:    'Backup Google Drive',
  backupBackblaze: 'Backup Backblaze B2',
  socketClients:   'Clientes Socket.io',
};

// ── Formatadores por check (transformam chaves em labels legíveis) ──
const FORMATTERS = {
  servidor: (d) => [
    ['Uptime', d.uptime],
    ['Node', d.nodeVersion],
    ['PID', d.pid],
    ['RAM (RSS)', d.memoria?.rss],
    ['Heap', `${d.memoria?.heapUsed} / ${d.memoria?.heapTotal}`],
  ],
  mongodb: (d) => [
    ['Conectado', d.conectado ? 'sim' : 'não'],
    ['Latência', d.latenciaMs != null ? d.latenciaMs + 'ms' : '—'],
    d.erro ? ['Erro', d.erro, 'erro'] : null,
  ],
  disco: (d) => [
    ['Total', d.total],
    ['Usado', d.usado],
    ['Livre', d.livre],
    ['% Usado', d.percentUsado != null ? d.percentUsado + '%' : '—',
      d.percentUsado >= 90 ? 'erro' : d.percentUsado >= 75 ? 'alerta' : null],
    d.erro ? ['Erro', d.erro, 'erro'] : null,
  ],
  dadosArquivo: (d) => [
    ['Tamanho', d.tamanho],
    ['Faturas', d.qtdFaturas != null ? d.qtdFaturas + ' páginas' : '—'],
    ['Conferidas', d.qtdConferidas != null ? d.qtdConferidas + ' faturas' : '—'],
    ['Vias de cliente', d.qtdViasCliente != null ? d.qtdViasCliente + ' registros' : '—'],
    ['Última modif.', d.horasDesdeModificacao != null ? d.horasDesdeModificacao + 'h atrás' : '—'],
    d.erro ? ['Erro', d.erro, 'erro'] : null,
  ],
  backupsLocais: (d) => [
    ['Quantidade', d.quantidade != null ? d.quantidade + ' arquivos' : '—'],
    ['Mais recente', d.maisRecente],
    ['Idade', d.horasDesdeUltimo != null ? d.horasDesdeUltimo + 'h atrás' : '—',
      d.horasDesdeUltimo > 72 ? 'erro' : d.horasDesdeUltimo > 24 ? 'alerta' : null],
    d.erro ? ['Erro', d.erro, 'erro'] : null,
  ],
  backupGoogle: (d) => [
    ['Último run', d.ultimoRun ? new Date(d.ultimoRun).toLocaleString('pt-BR') : '—'],
    ['Idade', d.horasDesdeUltimo != null ? d.horasDesdeUltimo + 'h atrás' : '—',
      d.horasDesdeUltimo > 60 ? 'erro' : d.horasDesdeUltimo > 36 ? 'alerta' : null],
    ['Sucesso', d.sucesso != null ? (d.sucesso ? 'sim' : 'não') : '—'],
    d.erro ? ['Aviso', d.erro, 'alerta'] : null,
  ],
  backupBackblaze: (d) => [
    ['Último run', d.ultimoRun ? new Date(d.ultimoRun).toLocaleString('pt-BR') : '—'],
    ['Idade', d.horasDesdeUltimo != null ? d.horasDesdeUltimo + 'h atrás' : '—',
      d.horasDesdeUltimo > 60 ? 'erro' : d.horasDesdeUltimo > 36 ? 'alerta' : null],
    ['Sucesso', d.sucesso != null ? (d.sucesso ? 'sim' : 'não') : '—'],
    d.qtdArquivos != null ? ['Arquivos', d.qtdArquivos] : null,
    d.tamanhoTotal ? ['Tamanho', d.tamanhoTotal] : null,
    d.erro ? ['Aviso', d.erro, 'alerta'] : null,
  ],
  socketClients: (d) => [
    ['Conectados', d.conectados != null ? d.conectados + ' cliente(s)' : '—'],
    d.erro ? ['Erro', d.erro, 'erro'] : null,
  ],
};

const STATUS_TXT = {
  ok:   'Tudo funcionando',
  warn: 'Atenção',
  erro: 'Algo deu errado',
};

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

function renderCheck(nome, check) {
  const label = LABELS[nome] || nome;
  const formatter = FORMATTERS[nome];
  const linhas = formatter
    ? formatter(check.detalhes || {}).filter(Boolean)
    : Object.entries(check.detalhes || {}).map(([k, v]) => [k, v]);

  const linhasHtml = linhas.map(([chave, valor, classe]) => `
    <div class="linha">
      <span class="chave">${escapeHtml(chave)}</span>
      <span class="valor ${classe || ''}">${escapeHtml(valor ?? '—')}</span>
    </div>`).join('');

  return `
    <div class="check-card">
      <div class="check-header">
        <div class="check-nome">${escapeHtml(label)}</div>
        <div class="check-badge" data-status="${check.status}">${check.status}</div>
      </div>
      <div class="check-detalhes">${linhasHtml}</div>
    </div>`;
}

function render(data) {
  const banner = `
    <div class="status-banner" data-status="${data.statusGeral}">
      <div>
        <div class="status-label">Status geral</div>
        <div class="status-valor">${STATUS_TXT[data.statusGeral] || data.statusGeral}</div>
      </div>
      <div class="status-timestamp">
        <strong>${new Date(data.verificadoEm).toLocaleTimeString('pt-BR')}</strong>
        ${new Date(data.verificadoEm).toLocaleDateString('pt-BR')}
      </div>
    </div>`;

  const ordemChecks = ['servidor', 'mongodb', 'disco', 'dadosArquivo',
                       'backupsLocais', 'backupGoogle', 'backupBackblaze', 'socketClients'];

  const cards = ordemChecks
    .filter(k => data.checks[k])
    .map(k => renderCheck(k, data.checks[k]))
    .join('');

  const grid = `<div class="checks-grid">${cards}</div>`;

  const footer = `
    <footer>
      <div>CAUS Faturas · Saúde v1.0</div>
      <div class="footer-actions">
        <button class="btn-primary" onclick="atualizar()">Atualizar agora</button>
        <a href="/saude" target="_blank">Ver JSON resumido</a>
        <a href="/saude/detalhe" target="_blank">Ver JSON completo</a>
      </div>
    </footer>`;

  document.getElementById('conteudo').innerHTML = banner + grid + footer;
}

async function atualizar() {
  try {
    const r = await fetch('/saude/detalhe', { cache: 'no-store' });
    const data = await r.json();
    render(data);
  } catch (e) {
    document.getElementById('conteudo').innerHTML = `
      <div class="msg-erro">
        <div style="color:var(--erro);font-weight:600;margin-bottom:8px;font-size:15px;">Não consegui consultar o sistema</div>
        <div>${escapeHtml(e.message)}</div>
      </div>`;
  }
}

// Auto-refresh a cada 30s
atualizar();
setInterval(atualizar, 30000);
</script>
</body>
</html>
